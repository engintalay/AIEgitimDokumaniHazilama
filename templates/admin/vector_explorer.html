<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector DB Gezgini</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/themes.css') }}?v=1.2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme !== 'dark') {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
    </script>
    <style>
        body {
            height: auto !important;
            min-height: 100vh;
            overflow: visible !important;
            position: relative;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .explorer-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            margin-top: 2rem;
            align-items: start;
            flex: 1;
        }

        @media (max-width: 900px) {
            .explorer-grid {
                grid-template-columns: 1fr;
            }
        }

        .sidebar-controls {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            position: sticky;
            top: 2rem;
            height: fit-content;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .control-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .search-area {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }

        .vector-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-primary, #6366f1);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            position: relative;
        }

        .vector-item:hover {
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }

        .vector-metadata {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
        }

        .meta-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .meta-tag.accent {
            background: rgba(var(--accent-rgb), 0.1);
            color: var(--accent-primary);
            border-color: rgba(var(--accent-rgb), 0.2);
        }

        .content-preview {
            line-height: 1.5;
            color: var(--text-main);
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            line-clamp: 4;
        }

        .vector-item.expanded .content-preview {
            display: block;
            -webkit-line-clamp: initial;
            line-clamp: initial;
        }

        .score-badge {
            float: right;
            font-family: monospace;
            font-weight: 600;
            background: rgba(var(--accent-rgb), 0.1);
            padding: 0.2rem 0.5rem;
            border-radius: 0.4rem;
            color: var(--accent-primary, #6366f1);
        }

        .expand-btn {
            background: transparent;
            border: none;
            color: var(--accent-primary, #6366f1);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0.5rem 0;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            transition: color 0.2s;
            margin-top: 0.5rem;
        }

        .expand-btn:hover {
            color: var(--primary-hover, #4f46e5);
            text-decoration: underline;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
            align-items: center;
        }

        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 1rem;
        }

        /* Specific fixes for embedded view */
        body.embedded-mode {
            background-color: transparent !important;
            height: 100vh !important;
            overflow: hidden !important;
        }

        body.embedded-mode .admin-container {
            height: 100vh;
            overflow-y: auto;
            padding: 1rem;
        }

        .embedded-mode .primary-btn {
            color: #ffffff !important;
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <header class="nav-header">
            <div>
                <h1>🧠 Vector DB Gezgini</h1>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Veri tabanındaki tüm indeksli paragrafları ve
                    benzerlik skorlarını inceleyin.</p>
            </div>
            <nav style="display: flex; gap: 1rem;">
                {% if is_admin %}
                <a href="/admin" class="view-btn"
                    style="background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main);">👥
                    Yönetim</a>
                {% endif %}
                <a href="/" class="view-btn"
                    style="background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main);">🏠
                    Uygulama</a>
            </nav>
        </header>

        <div class="explorer-grid">
            <div class="sidebar-controls">
                <div class="control-group">
                    <label>🔍 Vektörel Arama (Semantic Search)</label>
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="text" id="search-query" placeholder="Sorgu cümlesi yazın..." style="flex: 1;">
                        <button onclick="searchVector()" class="primary-btn" style="padding: 0.5rem 1rem;">Ara</button>
                    </div>
                </div>

                <div class="control-group">
                    <label>🗂️ Kaynağa Göre Filtrele</label>
                    <select id="source-filter" onchange="loadVectorData(0)">
                        <option value="">Tüm Kaynaklar</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>📊 Toplam Kayıt</label>
                    <div id="total-count" style="font-size: 1.5rem; font-weight: 600; color: var(--accent-primary);">0
                    </div>
                </div>

                <button onclick="resetView()" class="view-btn" style="width: 100%; text-align: center;">🔄 Görünümü
                    Sıfırla</button>
            </div>

            <div class="results-area">
                <div id="status-info" style="margin-bottom: 1rem; font-size: 0.9rem; color: var(--text-muted);"></div>
                <div id="vector-list">
                    <p>Yükleniyor...</p>
                </div>

                <div id="pagination" class="pagination" style="display: none;">
                    <button id="prev-btn" class="view-btn" onclick="changePage(-1)">◀ Önceki</button>
                    <span id="page-info">Sayfa 1</span>
                    <button id="next-btn" class="view-btn" onclick="changePage(1)">Sonraki ▶</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentOffset = 0;
        const limit = 20;
        let isSearchMode = false;

        async function init() {
            await loadSources();
            await loadVectorData();
        }

        async function loadSources() {
            const res = await fetch('/stats');
            const data = await res.json();
            const select = document.getElementById('source-filter');
            data.sources.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.name;
                opt.textContent = s.name;
                select.appendChild(opt);
            });
        }

        async function loadVectorData(offset = 0) {
            isSearchMode = false;
            currentOffset = offset;
            const source = document.getElementById('source-filter').value;
            const res = await fetch(`/vector_data?limit=${limit}&offset=${offset}${source ? '&source=' + encodeURIComponent(source) : ''}`);
            const data = await res.json();

            document.getElementById('total-count').textContent = data.total;
            renderList(data.results, "Tüm Kayıtlar");
            updatePagination(data.total);
        }

        async function searchVector() {
            const query = document.getElementById('search-query').value;
            if (!query) return;

            isSearchMode = true;
            document.getElementById('vector-list').innerHTML = '<p>Vektörel arama yapılıyor...</p>';

            const source = document.getElementById('source-filter').value;
            const res = await fetch('/vector_search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query, source, n_results: 10 })
            });
            const data = await res.json();

            renderList(data.results, `'${query}' için anlamsal sonuçlar`);

            // Do not hide pagination completely, clear page info effectively
            const pag = document.getElementById('pagination');
            pag.style.display = 'flex';
            document.getElementById('page-info').textContent = 'Arama Sonuçları';
            document.getElementById('prev-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
        }

        function renderList(items, title) {
            const container = document.getElementById('vector-list');
            document.getElementById('status-info').textContent = title;
            container.innerHTML = '';

            if (!items || items.length === 0) {
                container.innerHTML = '<p>Kayıt bulunamadı.</p>';
                return;
            }

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'vector-item';

                const meta = item.metadata;
                const scoreHtml = item.score !== undefined ? `<span class="score-badge">🎯 Skor: ${item.score}</span>` : '';

                div.innerHTML = `
                    ${scoreHtml}
                    <div class="content-preview">${item.content}</div>
                    <button class="expand-btn">Genişlet ▼</button>
                    <div class="vector-metadata">
                        <span class="meta-tag accent">📄 ${meta.source}</span>
                        <span class="meta-tag">🆔 ID: ${item.id.split('_').pop()}</span>
                        <span class="meta-tag">👤 User: ${meta.user_name || meta.user_id}</span>
                        <span class="meta-tag">🌍 ${meta.is_public ? 'Genel' : 'Özel'}</span>
                    </div>
                `;

                const expandBtn = div.querySelector('.expand-btn');
                expandBtn.onclick = () => {
                    const isExpanded = div.classList.toggle('expanded');
                    expandBtn.innerHTML = isExpanded ? 'Daralt ▲' : 'Genişlet ▼';
                };

                container.appendChild(div);
            });
        }

        function updatePagination(total) {
            const pag = document.getElementById('pagination');
            if (isSearchMode || total <= limit) {
                pag.style.display = 'none';
                return;
            }
            pag.style.display = 'flex';
            document.getElementById('prev-btn').style.display = 'inline-block';
            document.getElementById('next-btn').style.display = 'inline-block';

            const pageCount = Math.ceil(total / limit);
            const currentPage = Math.floor(currentOffset / limit) + 1;
            document.getElementById('page-info').textContent = `${currentPage} / ${pageCount} Sayfa`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = currentPage === pageCount;
        }

        function changePage(dir) {
            loadVectorData(currentOffset + (dir * limit));
        }

        function resetView() {
            document.getElementById('search-query').value = '';
            document.getElementById('source-filter').value = '';
            loadVectorData(0);
        }

        if (new URLSearchParams(window.location.search).get('embed') === 'true') {
            document.body.classList.add('embedded-mode');

            // Sync theme from parent
            const urlTheme = new URLSearchParams(window.location.search).get('theme');
            if (urlTheme && urlTheme !== 'dark') {
                document.documentElement.setAttribute('data-theme', urlTheme);
            }

            const header = document.querySelector('.nav-header');
            if (header) header.style.display = 'none';
            const container = document.querySelector('.admin-container');
            if (container) {
                container.style.padding = '10px';
                container.style.maxWidth = '100%';
            }
            const grid = document.querySelector('.explorer-grid');
            if (grid) {
                // Stack layout vertically for iframe to avoid horizontal stretching/clipping
                grid.style.gridTemplateColumns = '1fr';
            }
            const sidebarControl = document.querySelector('.sidebar-controls');
            if (sidebarControl) {
                // Remove sticky positioning so it scrolls naturally with the page
                sidebarControl.style.position = 'static';
                // Adjust flex direction of search area to fix cropped button
                const searchArea = sidebarControl.querySelector('.control-group > div[style*="flex"]');
                if (searchArea) {
                    searchArea.style.flexWrap = 'wrap';
                }
            }
        }
        init();
    </script>
</body>

</html>
